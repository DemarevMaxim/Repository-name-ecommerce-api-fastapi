version: "3.9"

services:

  db:
    image: postgres:15
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: ecommerce_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
